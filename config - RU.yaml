  news_every_minutes: 30

  programs:

  - days:
    - everyday
    description: ""
    djs:
    - DJ_3
    prompt: "Сгенерируй длинный структурированный подкаст-диалог о любви и играх в Италии. Это должна быть естественная беседа между несколькими участниками. Диалог длительностью примерно 30 минут. Раздели его на 5 частей, каждая часть должна раскрывать отдельную тему. Участники могут спорить, перебивать друг друга и обсуждать факты. Добавляй юмор и интересные детали."
    start_time: 00:00
    title: Любовь и игры
    type: music

  - days:
    - everyday
    description: ""
    djs:
    - DJ_Milka
    prompt: ""
    start_time: 02:00
    title: Ночной джаз
    type: music

  - days:
    - weekdays
    description: Энергичное утреннее шоу с бодрой музыкой.
    djs:
    - DJ_A
    prompt: Говорите энергично и позитивно. Обсуждайте утренние привычки и планы на день.
    start_time: 06:00
    title: Утренний старт
    type: music

  - days:
    - weekends
    description: Музыка для активного начала выходных.
    djs:
    - DJ_3
    - DJ_A
    prompt: Максимально энергичная подача. Обсуждение вечеринок и планов на выходные.
    start_time: "10:00"
    title: Старт выходных
    type: music

  - days:
    - weekdays
    description: Спокойная музыка для рабочего дня.
    djs:
    - DJ_B
    prompt: Спокойная и сосредоточенная атмосфера. Говорите о продуктивности и отдыхе.
    start_time: "12:00"
    title: Дневной чилл
    type: music

  - days:
    - everyday
    description: Ночные разговоры и спокойная музыка.
    djs:
    - DJ_A
    - DJ_3
    prompt: Спокойный и философский тон. Разговоры о ночи, воспоминаниях и размышлениях.
    start_time: "20:00"
    title: Ночное радио
    type: music

  - days:
    - everyday
    description: Подкаст о Гарри Поттере, персонажах, теориях и деталях книг.
    djs:
    - DJ_A
    - DJ_3
    - DJ_B
    prompt: "Это подкаст о вселенной Гарри Поттера. Ведущие обсуждают книги, персонажей, теории и скрытые смыслы. Разговор должен быть живым, эмоциональным и иногда спорным. Между обсуждениями играет музыка. Перед каждой песней один из ведущих говорит короткую фразу — шутку, комментарий или мини-историю."
    start_time: "22:00"
    title: Разговоры о книгах
    type: talk

