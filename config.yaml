    prompt: 'US Defense Secretary Pete Hegseth says a US submarine sank an Iranian
      warship in the Indian Ocean with a torpedo


      Hegseth did not name the ship - but earlier, the Sri Lankan navy said around
      140 people were missing after an Iranian ship, the Iris Dena, went down off
      the coast of Galle


      At the same news conference, Chairman of the Joint Chiefs of Staff, Gen Dan
      Caine, says the US will strike "progressively deeper into Iranian territory"


      The UK is sending a warship to the eastern Mediterranean after attacks on a
      British base in Cyprus - but it is not expected to set off this week


      Meanwhile, Israel says it hit "security headquarters" across Tehran, as US-Israeli
      airstrikes continue in Iran


      "It''s getting worse and worse every day," one man in Tehran tells the BBC.
      A three-day funeral ceremony for ex-Supreme Leader Ayatollah Ali Khamenei, due
      to start this evening, has been postponed


      Israel is also hitting Lebanon - we speak to the owner of a Lebanese hotel that
      was hit


